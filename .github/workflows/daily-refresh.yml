name: Keep App Awake
 
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
 
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping NSE Valuation Suite
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://nse-valuation-suite-danishalam.streamlit.app/ || true
          echo "App pinged at $(date)"